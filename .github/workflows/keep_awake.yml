name: Wake Up Render API

on:
  schedule:
    # This runs every 14 minutes (Render sleeps at 15m)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://aniflex-api.onrender.com/
          
